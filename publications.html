<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Publications | Soft Matter Lab</title>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html">
      <img src="images/lab-logo.png" alt="Lab Logo" style="height: 45px; width: auto; display: block;"> 
    </a>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="people.html">People</a></li>
    <li><a href="publications.html">Publications</a></li>
    <li><a href="news.html">News</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section id="publications" style="padding-top: 120px; background:#fff;">
  <div class="pubs-header">
    <div>
      <div class="section-label">Selected Works</div>
      <h2 class="section-title">Publications</h2>
    </div>
  </div>
  <div class="pub-list" id="pubs-container"></div>
</section>

<footer>
  <div class="footer-logo">Soft Matter Lab · <span>Ashoka University</span></div>
  <div class="footer-copy">© 2025 Soft Matter Research Lab</div>
  <div class="footer-links">
    <a href="#">Twitter</a>
    <a href="#">Google Scholar</a>
    <a href="#">GitHub</a>
  </div>
</footer>

<script>
  fetch('data/publications.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('pubs-container').innerHTML = data.map(pub => `
        <div class="pub-item">
          <div class="pub-year">${pub.year}</div>
          <div>
            <div class="pub-title">${pub.title}</div>
            <div class="pub-authors">${pub.authors}</div>
            <div class="pub-journal">${pub.journal}</div>
          </div>
        </div>
      `).join('');
    }).catch(err => console.log('Error loading publication data:', err));
</script>

</body>
</html>
