<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Facilities | Soft Matter Lab</title>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div id="nav-placeholder"></div>

<section id="facilities" style="padding-top: 140px; flex-grow: 1;">
  <div class="section-label">Equipment & Hardware</div>
  <h2 class="section-title">Research Facilities</h2>
  <p class="section-intro" style="margin-bottom: 3rem;">Click on any instrument to view its details and applications within our lab.</p>
  
  <div class="facilities-grid" id="facilities-container"></div>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('data/facilities.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('facilities-container').innerHTML = data.map(fac => `
        <div class="facility-card" onclick="this.classList.toggle('expanded')">
          <div class="facility-img ${fac.img_class}">${fac.img_icon}</div>
          <div class="facility-body">
            <div class="facility-title">${fac.title}</div>
            <div class="facility-content">
              <p>${fac.desc}</p>
            </div>
          </div>
        </div>
      `).join('');
    }).catch(err => console.log('Error loading facilities data:', err));
</script>
<script>
  // Load Navigation
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
      
      // Attach mobile menu logic AFTER the nav is loaded
      document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('nav-links').classList.toggle('active');
        this.classList.toggle('open');
      });
    });

  // Load Footer
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
</script>
</body>
</html>
