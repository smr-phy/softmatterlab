<body class="page-wrapper">
<div id="nav-placeholder"></div>
<section id="facilities" class="page-content">
  <div class="section-label">Equipment & Hardware</div>
  <h2 class="section-title">Research Facilities</h2>
  <p class="section-intro spacing-bottom-lg">Click on any instrument to view its details and applications within our lab.</p>
  <div class="facilities-grid" id="facilities-container"></div>
</section>
<div id="footer-placeholder"></div>
<script>
  fetch('data/facilities.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('facilities-container').innerHTML = data.map(fac => `
        <div class="facility-card">
          <div class="facility-img ${fac.img_class}">${fac.img_icon}</div>
          <div class="facility-body">
            <div class="facility-title">${fac.title}</div>
            <div class="facility-content"><p>${fac.desc}</p></div>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.facility-card').forEach(card => card.addEventListener('click', function() { this.classList.toggle('expanded'); }));
    }).catch(err => console.log(err));

  fetch('nav.html').then(r => r.text()).then(data => {
    document.getElementById('nav-placeholder').outerHTML = data;
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('nav-links').classList.toggle('active'); this.classList.toggle('open');
    });
  });
  fetch('footer.html').then(r => r.text()).then(data => { document.getElementById('footer-placeholder').outerHTML = data; });
</script>
</body>
