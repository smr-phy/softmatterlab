<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="view-transition" content="same-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Facilities | Soft Matter Lab</title>
</head>
<body class="page-wrapper">

<div id="nav-placeholder"></div>

<section id="facilities" class="page-content">
  <div class="section-label">Equipment & Hardware</div>
  <h2 class="section-title">Research Facilities</h2>
  <p class="section-intro spacing-bottom-lg">Click on any instrument to view its details and applications within our lab.</p>
  
  <div class="facilities-grid" id="facilities-container"><p>Loading facilities...</p></div>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('data/facilities.json').then(res => res.json()).then(data => {
    const container = document.getElementById('facilities-container');
    container.innerHTML = data.map(fac => `
      <div class="facility-card">
        <img src="${fac.image}" alt="${fac.title}" class="facility-img" onerror="this.onerror=null; this.src='images/placeholder.jpg'">
        
        <div class="facility-body">
          <div class="facility-title">${fac.title}</div>
          <div class="facility-content"><p>${fac.desc}</p></div>
        </div>
      </div>
    `).join('');
    
    // Accordion Logic
    container.addEventListener('click', function(e) {
      const clickedCard = e.target.closest('.facility-card');
      if (!clickedCard) return;
      container.querySelectorAll('.facility-card').forEach(card => {
        if (card !== clickedCard) card.classList.remove('expanded');
      });
      clickedCard.classList.toggle('expanded');
    });
  });

  fetch('nav.html').then(r => r.text()).then(data => {
    document.getElementById('nav-placeholder').outerHTML = data;
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('nav-links').classList.toggle('active'); this.classList.toggle('open');
    });
  });
  fetch('footer.html').then(r => r.text()).then(data => { document.getElementById('footer-placeholder').outerHTML = data; });
</script>
</body>
</html>
