<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Research | Soft Matter Lab</title>
</head>
<body class="page-wrapper">

<div id="nav-placeholder"></div>

<section id="research" class="page-content">
  <div class="research-header">
    <div>
      <div class="section-label">Our Science</div>
      <h2 class="section-title">Research Areas</h2>
    </div>
    <p class="section-intro">Our interdisciplinary research spans the boundary between physics, chemistry, and biology — probing materials that defy simple classification. Click any area to learn more about our ongoing projects.</p>
  </div>

  <div class="research-grid" id="research-container">
    <p style="grid-column: 1/-1; color: var(--slate);">Loading research data...</p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('data/research.json')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('research-container');
      container.innerHTML = data.map(res => `
        <div class="research-card ${res.color}">
          <div class="rc-number">${res.number}</div>
          <div class="rc-title">${res.title}</div>
          <p class="rc-desc">${res.desc}</p>
          <div class="rc-tags">${res.tags.map(t => `<span class="rc-tag">${t}</span>`).join('')}</div>
          <div class="rc-details"><p>${res.details}</p></div>
        </div>
      `).join('');
      container.querySelectorAll('.research-card').forEach(card => {
        card.addEventListener('click', function() { this.classList.toggle('expanded'); });
      });
    })
    .catch(err => {
      document.getElementById('research-container').innerHTML = '<p style="grid-column: 1/-1; color: var(--slate);">Unable to load research data.</p>';
      console.error(err);
    });

  fetch('nav.html')
    .then(r => r.text())
    .then(data => {
      document.getElementById('nav-placeholder').outerHTML = data;
      document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('nav-links').classList.toggle('active');
        this.classList.toggle('open');
      });
    })
    .catch(err => console.error('Failed to load nav:', err));

  fetch('footer.html')
    .then(r => r.text())
    .then(data => {
      document.getElementById('footer-placeholder').outerHTML = data;
    })
    .catch(err => console.error('Failed to load footer:', err));
</script>

</body>
</html>
