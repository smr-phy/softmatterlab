<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>People | Soft Matter Lab</title>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div id="nav-placeholder"></div>

<section id="people" style="padding-top: 140px; flex-grow: 1;">
  <div class="people-header">
    <div>
      <div class="section-label">The Team</div>
      <h2 class="section-title">People</h2>
    </div>
    <p class="section-intro">A diverse group of physicists, chemists, and biophysicists united by a passion for soft matter.</p>
  </div>
  <div class="team-grid" id="team-container"></div>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('data/people.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('team-container').innerHTML = data.map(person => `
        <div class="team-card" onclick="this.classList.toggle('expanded')">
          <img src="${person.image}" alt="${person.name}" class="avatar-img" onerror="this.src='images/placeholder.jpg'">
          
          <div class="team-name">${person.name}</div>
          <div class="team-role">${person.role}</div>
          
          <div class="team-content">
            <p>${person.bio}</p>
            <div class="team-links">
              ${person.scholar ? `<a href="${person.scholar}" target="_blank" rel="noopener noreferrer">Google Scholar</a>` : ''}
              ${person.linkedin ? `<a href="${person.linkedin}" target="_blank" rel="noopener noreferrer">LinkedIn</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }).catch(err => console.log('Error loading people data:', err));
</script>
<script>
  // Load Navigation
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
      
      // Attach mobile menu logic AFTER the nav is loaded
      document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('nav-links').classList.toggle('active');
        this.classList.toggle('open');
      });
    });

  // Load Footer
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
</script>
</body>
</html>
