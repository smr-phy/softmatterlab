<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>People | Soft Matter Lab</title>
</head>
<body class="page-wrapper">

<div id="nav-placeholder"></div>

<section id="people" class="page-content">
  <div class="people-header">
    <div>
      <div class="section-label">The Team</div>
      <h2 class="section-title">People</h2>
    </div>
    <p class="section-intro">A diverse group of physicists, chemists, and biophysicists united by a passion for soft matter.</p>
  </div>
  <div class="team-grid" id="team-container">
    <p style="grid-column: 1/-1; color: var(--slate);">Loading team data...</p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('data/people.json')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('team-container');
      container.innerHTML = data.map(person => `
        <div class="team-card">
          <img src="${person.image}" alt="${person.name}" class="avatar-img" onerror="this.onerror=null; this.src='images/placeholder.jpg'">
          <div class="team-name">${person.name}</div>
          <div class="team-role">${person.role}</div>
          <div class="team-content">
            <p>${person.bio}</p>
            <div class="team-links">
              ${person.scholar ? `<a href="${person.scholar}" target="_blank" rel="noopener noreferrer">Google Scholar</a>` : ''}
              ${person.linkedin ? `<a href="${person.linkedin}" target="_blank" rel="noopener noreferrer">LinkedIn</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');

      const cards = container.querySelectorAll('.team-card');
      cards.forEach(card => {
        card.addEventListener('click', function() {
          this.classList.toggle('expanded');
        });
      });
    }).catch(err => {
      document.getElementById('team-container').innerHTML = '<p>Unable to load people data.</p>';
      console.error(err);
    });

  // Load Navigation
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').outerHTML = data;
      const hamburger = document.getElementById('hamburger');
      if (hamburger) {
        hamburger.addEventListener('click', function() {
          document.getElementById('nav-links').classList.toggle('active');
          this.classList.toggle('open');
        });
      }
    })
    .catch(err => console.error('Failed to load nav:', err));

  // Load Footer
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').outerHTML = data;
    })
    .catch(err => console.error('Failed to load footer:', err));
</script>
</body>
</html>
