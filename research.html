<body class="page-wrapper">
<div id="nav-placeholder"></div>
<section id="research" class="page-content">
  <div class="research-header">
    <div><div class="section-label">Our Science</div><h2 class="section-title">Research Areas</h2></div>
    <p class="section-intro">Our interdisciplinary research spans the boundary between physics, chemistry, and biology — probing materials that defy simple classification.</p>
  </div>
  <div class="research-grid" id="research-container"></div>
</section>
<div id="footer-placeholder"></div>
<script>
  fetch('data/research.json')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('research-container');
      container.innerHTML = data.map(res => `
        <div class="research-card ${res.color}">
          <div class="rc-number">${res.number}</div>
          <div class="rc-title">${res.title}</div>
          <p class="rc-desc">${res.desc}</p>
          <div class="rc-tags">${res.tags.map(t => `<span class="rc-tag">${t}</span>`).join('')}</div>
          <div class="rc-details"><p>${res.details}</p></div>
        </div>
      `).join('');
      container.querySelectorAll('.research-card').forEach(card => card.addEventListener('click', function() { this.classList.toggle('expanded'); }));
    }).catch(err => console.log(err));

  fetch('nav.html').then(r => r.text()).then(data => {
    document.getElementById('nav-placeholder').outerHTML = data;
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('nav-links').classList.toggle('active'); this.classList.toggle('open');
    });
  });
  fetch('footer.html').then(r => r.text()).then(data => { document.getElementById('footer-placeholder').outerHTML = data; });
</script>
</body>
