<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Research | Soft Matter Lab</title>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div id="nav-placeholder"></div>

<section id="research" style="padding-top: 140px; flex-grow: 1;">
  <div class="research-header">
    <div>
      <div class="section-label">Our Science</div>
      <h2 class="section-title">Research Areas</h2>
    </div>
    <p class="section-intro">Our interdisciplinary research spans the boundary between physics, chemistry, and biology — probing materials that defy simple classification. Click any area to learn more about our ongoing projects.</p>
  </div>
  
  <div class="research-grid" id="research-container"></div>
</section>

<div id="footer-placeholder"></div>
  
<script>
  fetch('data/research.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('research-container').innerHTML = data.map(res => `
        <div class="research-card ${res.color}" onclick="this.classList.toggle('expanded')">
          <div class="rc-number">${res.number}</div>
          <div class="rc-title">${res.title}</div>
          <p class="rc-desc">${res.desc}</p>
          
          <div class="rc-tags">
            ${res.tags.map(tag => `<span class="rc-tag">${tag}</span>`).join('')}
          </div>
          
          <div class="rc-details">
            <p>${res.details}</p>
          </div>
        </div>
      `).join('');
    }).catch(err => console.log('Error loading research data:', err));
</script>
<script>
  // Load Navigation
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
      
      // Attach mobile menu logic AFTER the nav is loaded
      document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('nav-links').classList.toggle('active');
        this.classList.toggle('open');
      });
    });

  // Load Footer
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
</script>
</body>
</html>
