<!DOCTYPE html>
<html lang="en">
<head>
<title>Research Themes | Soft & Active Matter Physics Lab (SAMP) | Ashoka University</title>
<meta name="description" content="Discover our ongoing experimental physics research in soft and active matter, liquid crystal dynamics, and phase transitions at Ashoka University.">
<link rel="icon" type="image/png" href="images/favicon.png">
<meta charset="UTF-8">
<meta name="view-transition" content="same-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body class="page-wrapper">

<div id="nav-placeholder"></div>

<section id="research" class="page-content">
  <div class="research-header">
    <div>
      <div class="section-label">Our Science</div>
      <h2 class="section-title">Research Projects</h2>
    </div>
  </div>
  
  <div class="research-grid" id="research-container">
    <p style="grid-column: 1/-1;">Loading research data...</p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script>
  // Load Research Cards
  fetch('data/research.json')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('research-container');
      container.innerHTML = data.map(res => `
        <div class="research-card ${res.color}">
          <div class="rc-number">${res.number}</div>
          <div class="rc-title">${res.title}</div>
          <p class="rc-desc">${res.desc}</p>
          <div class="rc-tags">${res.tags.map(t => `<span class="rc-tag">${t}</span>`).join('')}</div>
          <div class="rc-details"><p>${res.details}</p></div>
        </div>
      `).join('');
      
      // Accordion Logic (This is the one that works perfectly!)
      container.addEventListener('click', function(e) {
        const clickedCard = e.target.closest('.research-card');
        if (!clickedCard) return;
        container.querySelectorAll('.research-card').forEach(card => {
          if (card !== clickedCard) card.classList.remove('expanded');
        });
        clickedCard.classList.toggle('expanded');
      });
    }).catch(err => console.log('Error:', err));

  // Load Navigation
  fetch('nav.html').then(r => r.text()).then(data => {
    document.getElementById('nav-placeholder').outerHTML = data;
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('nav-links').classList.toggle('active'); this.classList.toggle('open');
    });
  });
  
  // Load Footer
  fetch('footer.html').then(r => r.text()).then(data => { 
    document.getElementById('footer-placeholder').outerHTML = data; 
  });
</script>
</body>
</html>
