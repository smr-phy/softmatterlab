<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>Contact | Soft Matter Lab</title>
</head>
<body class="page-wrapper">

<div id="nav-placeholder"></div>

<main class="page-content" style="padding-bottom: 120px;">
  <div style="max-width: 900px; margin: 0 auto; text-align: center;">
    
    <h2 class="section-title">Contact & Join Us</h2>
    <p style="font-size:16px; color:var(--slate); line-height:1.8; margin-top:1rem; padding: 0 20px;">
      We welcome motivated students and postdocs. If you're curious about soft matter, reach out — we'd love to hear from you.
    </p>
    
    <div class="contact-info" style="margin-top: 4rem; display: flex; flex-direction: column; align-items: center; gap: 2.5rem;">
      
      <div class="contact-row" style="display: flex; gap: 1.5rem; align-items: center; text-align: left; width: 100%; max-width: 420px;">
        <div class="contact-icon" style="width: 52px; height: 52px; background: #fff; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #d946ef; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
          📍
        </div>
        <div>
          <div class="contact-label" style="font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; margin-bottom: 4px;">Address</div>
          <div class="contact-value" style="font-size: 15px; color: var(--ink); line-height: 1.5;">Dept. of Physics, Ashoka University<br>Rajiv Gandhi Education City, Sonipat 131029</div>
        </div>
      </div>
      
      <div class="contact-row" style="display: flex; gap: 1.5rem; align-items: center; text-align: left; width: 100%; max-width: 420px;">
        <div class="contact-icon" style="width: 52px; height: 52px; background: #fff; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--rose); flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
          ✉
        </div>
        <div>
          <div class="contact-label" style="font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; margin-bottom: 4px;">Email</div>
          <div class="contact-value" style="font-size: 15px; color: var(--ink);"><a href="mailto:softmatter@ashoka.edu.in" style="color: inherit; text-decoration: none;">softmatter@ashoka.edu.in</a></div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script>
  fetch('nav.html').then(r => r.text()).then(data => {
    document.getElementById('nav-placeholder').outerHTML = data;
    const hamburger = document.getElementById('hamburger');
    if (hamburger) {
      hamburger.addEventListener('click', function() {
        document.getElementById('nav-links').classList.toggle('active'); 
        this.classList.toggle('open');
      });
    }
  });

  fetch('footer.html').then(r => r.text()).then(data => { 
    document.getElementById('footer-placeholder').outerHTML = data; 
  });
</script>

</body>
</html>
